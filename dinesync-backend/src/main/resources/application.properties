spring.application.name=dinesync
server.port=5002

# MySQL Data Source
spring.datasource.url=jdbc:mysql://localhost:3306/dinesync?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# C4 fix: All secrets read from environment variables with dev-only fallbacks.
# ─── In production: set DB_PASSWORD, JWT_SECRET, KITCHEN_SECRET as OS/Docker env vars.
# ─── For local dev: fallback values below are used automatically.
# ─── NEVER commit real production values here or in .env files tracked by Git.
spring.datasource.password=${DB_PASSWORD:mahitnahi}

# Script Initialization
spring.sql.init.mode=always
spring.jpa.hibernate.ddl-auto=none

# JPA / Hibernate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=${JWT_SECRET:dinesync-super-secure-jwt-secret-key-minimum-256-bits-long-for-hmac-sha256}
jwt.expiration=86400000

# Kitchen authentication (X-Kitchen-Secret header on PUT /api/orders/*/status)
kitchen.secret=${KITCHEN_SECRET:dinesync-kitchen-secret-2024}

# Session expiry scheduler (Phase 4)
# How often to scan for idle sessions (ms). Default: 30 minutes.
session.expiry.check-interval-ms=1800000
# How long a session can be idle before expiry (hours). Default: 2 hours.
session.expiry.idle-timeout-hours=2
