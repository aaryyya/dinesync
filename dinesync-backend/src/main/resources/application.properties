spring.application.name=dinesync
server.port=5002

# 1. Active MySQL Data Source Configuration
# Added '?createDatabaseIfNotExist=true' so you don't have to manually create the 'dinesync' schema in MySQL first.
spring.datasource.url=jdbc:mysql://localhost:3306/dinesync?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
# Edit username & password according to your setup mostly the username is root
spring.datasource.username=root
spring.datasource.password=drstrange
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Critical Script Initialization Rules
# CRITICAL: Forces Spring Boot to run your schema.sql script on an external MySQL instance
spring.sql.init.mode=always

# CRITICAL: Stops Hibernate from overriding, altering, or interfering with your schema.sql script
spring.jpa.hibernate.ddl-auto=none

# 3. JPA / Hibernate Dialect Settings
spring.jpa.show-sql=true
# Updated to match standard MySQL engine architecture smoothly
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
